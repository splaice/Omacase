# omacase AeroSpace config — Hyprland-style tiling keybinds on macOS.
# Docs: https://nikitabobko.github.io/AeroSpace/guide

# NOTE: all top-level keys MUST come before the first [table] header (e.g.
# [gaps]) — in TOML everything after a header belongs to that table.

start-at-login = true

# Tiling defaults (Hyprland-ish: gaps + accordion fallback).
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
accordion-padding = 30

# Normalization on so the tree behaves predictably like i3.
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Restart borders/sketchybar when AeroSpace (re)starts.
after-startup-command = [
  'exec-and-forget brew services start borders',
  'exec-and-forget brew services start sketchybar',
]
# Tell SketchyBar which workspace is focused.
exec-on-workspace-change = ['/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE']

# Gaps (the Hyprland look). Keep this table AFTER all top-level keys above.
[gaps]
inner.horizontal = 8
inner.vertical   = 8
outer.left       = 8
outer.right      = 8
outer.top        = 8       # macOS menu bar; AeroSpace already avoids it
outer.bottom     = 40      # room for SketchyBar (position=bottom, height 32)

# Super = right ⌘ → ⌃⌥⌘ (via Karabiner), so 'cmd-ctrl-alt' is "Super" and
# 'cmd-ctrl-alt-shift' is "Super + Shift". Mirrors Omarchy's SUPER / SUPER+SHIFT.
[mode.main.binding]
# --- focus (Super + WASD) ---
cmd-ctrl-alt-a = 'focus left'
cmd-ctrl-alt-s = 'focus down'
cmd-ctrl-alt-w = 'focus up'
cmd-ctrl-alt-d = 'focus right'

# --- move (Super + Shift + WASD) ---
cmd-ctrl-alt-shift-a = 'move left'
cmd-ctrl-alt-shift-s = 'move down'
cmd-ctrl-alt-shift-w = 'move up'
cmd-ctrl-alt-shift-d = 'move right'

# --- join into nested containers (Super + Shift + arrows) ---
# Merge the focused window with its neighbor into a container. With opposite-
# orientation normalization on, the nested container runs perpendicular to its
# parent — so joining two pairs builds a 2x2 grid. E.g. from a row [1][2][3][4]:
# focus 2 + join left, then focus 4 + join left → [1/2][3/4].
cmd-ctrl-alt-shift-left  = 'join-with left'
cmd-ctrl-alt-shift-down  = 'join-with down'
cmd-ctrl-alt-shift-up    = 'join-with up'
cmd-ctrl-alt-shift-right = 'join-with right'

# --- resize ---
cmd-ctrl-alt-minus = 'resize smart -50'
cmd-ctrl-alt-equal = 'resize smart +50'

# --- layout ---
cmd-ctrl-alt-shift-space = 'layout floating tiling'   # toggle float
cmd-ctrl-alt-e           = 'layout tiles horizontal vertical'
cmd-ctrl-alt-q           = 'exec-and-forget omacase grid'   # Super+q → toggle 2x2 grid ("quad")
cmd-ctrl-alt-z           = 'layout accordion horizontal vertical'   # Super+z → accordion
cmd-ctrl-alt-f           = 'fullscreen'

# --- workspaces (Super + number) ---
cmd-ctrl-alt-1 = 'workspace 1'
cmd-ctrl-alt-2 = 'workspace 2'
cmd-ctrl-alt-3 = 'workspace 3'
cmd-ctrl-alt-4 = 'workspace 4'
cmd-ctrl-alt-5 = 'workspace 5'
cmd-ctrl-alt-6 = 'workspace 6'
cmd-ctrl-alt-7 = 'workspace 7'
cmd-ctrl-alt-8 = 'workspace 8'
cmd-ctrl-alt-9 = 'workspace 9'

# --- move window to workspace (Super + Shift + number) ---
cmd-ctrl-alt-shift-1 = 'move-node-to-workspace 1'
cmd-ctrl-alt-shift-2 = 'move-node-to-workspace 2'
cmd-ctrl-alt-shift-3 = 'move-node-to-workspace 3'
cmd-ctrl-alt-shift-4 = 'move-node-to-workspace 4'
cmd-ctrl-alt-shift-5 = 'move-node-to-workspace 5'
cmd-ctrl-alt-shift-6 = 'move-node-to-workspace 6'
cmd-ctrl-alt-shift-7 = 'move-node-to-workspace 7'
cmd-ctrl-alt-shift-8 = 'move-node-to-workspace 8'
cmd-ctrl-alt-shift-9 = 'move-node-to-workspace 9'

# --- misc ---
cmd-ctrl-alt-enter         = 'exec-and-forget open -na Ghostty'   # Super+Return → terminal (Omarchy)
cmd-ctrl-alt-shift-enter   = 'exec-and-forget open -na Ghostty --args -e tmux new-session -A -s main'   # Super+Shift+Return → terminal + tmux (attach/create "main")
cmd-ctrl-alt-tab           = 'workspace --wrap-around next'   # Super+Tab → next workspace (Omarchy)
cmd-ctrl-alt-shift-tab     = 'workspace --wrap-around prev'   # Super+Shift+Tab → previous workspace (Omarchy)
cmd-ctrl-alt-shift-c       = 'reload-config'
cmd-ctrl-alt-shift-semicolon = 'mode service'   # enter a service sub-mode

# Service mode hosts the functions Omarchy puts on Super+Ctrl / Super+Shift+Alt —
# chords we can't express, since Super (⌃⌥⌘) already consumes Ctrl and Alt.
[mode.service.binding]
esc          = ['reload-config', 'mode main']
r            = ['flatten-workspace-tree', 'mode main']  # reset tree
f            = ['layout floating tiling', 'mode main']
backspace    = ['close-all-windows-but-current', 'mode main']
tab          = ['workspace-back-and-forth', 'mode main']                       # former workspace (Omarchy Super+Ctrl+Tab)
m            = ['move-workspace-to-monitor --wrap-around next', 'mode main']    # send workspace to next monitor

# Example window rule: float the system Settings & Finder info windows.
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'
